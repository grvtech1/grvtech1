# ════════════════════════════════════════════════════════════════
#  Snake animation generator
#  →  goes in repo grvtech1/grvtech1 at: .github/workflows/snake.yml
#  Runs daily (+ on demand), draws your contribution graph as a snake,
#  and pushes the SVGs to the `output` branch (which the README points to).
# ════════════════════════════════════════════════════════════════
name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"      # daily refresh
  workflow_dispatch:          # run manually from the Actions tab
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        id: snake
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
            dist/github-contribution-grid-snake.svg

      - name: Push to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
